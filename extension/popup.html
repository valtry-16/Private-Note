<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZeroVault</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <!-- Login Screen -->
    <div id="login-screen" class="screen active">
      <div class="logo">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L3 7v6c0 5.25 3.82 10.16 9 11.28C17.18 23.16 21 18.25 21 13V7l-9-5z" stroke="#3b82f6" stroke-width="1.5" fill="#3b82f6" fill-opacity="0.1"/>
          <rect x="9" y="10" width="6" height="7" rx="1" fill="#3b82f6" fill-opacity="0.3" stroke="#3b82f6" stroke-width="1.2"/>
          <path d="M10 10V8a2 2 0 0 1 4 0v2" stroke="#3b82f6" stroke-width="1.2" fill="none" stroke-linecap="round"/>
          <circle cx="12" cy="13.5" r="1" fill="#3b82f6"/>
        </svg>
        <h1>ZeroVault</h1>
      </div>
      <p class="subtitle">Unlock your encrypted vault</p>
      <form id="login-form">
        <input type="email" id="email" placeholder="Email" required autocomplete="email">
        <div class="input-wrapper">
          <input type="password" id="password" placeholder="Account Password" required autocomplete="current-password">
          <button type="button" class="eye-toggle" data-target="password" title="Show password">
            <svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="eye-closed hidden" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
        <div class="input-wrapper">
          <input type="password" id="master-password" placeholder="Master Password" required autocomplete="off">
          <button type="button" class="eye-toggle" data-target="master-password" title="Show password">
            <svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="eye-closed hidden" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
        <button type="submit" id="login-btn">
          <span class="btn-text">Unlock Vault</span>
          <span class="btn-loader hidden">⏳</span>
        </button>
      </form>
      <p id="login-error" class="error hidden"></p>
      <a href="https://zero-vault-storage.vercel.app" target="_blank" class="link">Open ZeroVault Web</a>
    </div>

    <!-- Vault Screen -->
    <div id="vault-screen" class="screen">
      <div class="header">
        <div class="header-left">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M12 2L3 7v6c0 5.25 3.82 10.16 9 11.28C17.18 23.16 21 18.25 21 13V7l-9-5z" stroke="#3b82f6" stroke-width="1.5" fill="#3b82f6" fill-opacity="0.1"/>
            <rect x="9" y="10" width="6" height="7" rx="1" fill="#3b82f6" fill-opacity="0.3" stroke="#3b82f6" stroke-width="1.2"/>
            <path d="M10 10V8a2 2 0 0 1 4 0v2" stroke="#3b82f6" stroke-width="1.2" fill="none" stroke-linecap="round"/>
            <circle cx="12" cy="13.5" r="1" fill="#3b82f6"/>
          </svg>
          <span class="header-title">ZeroVault</span>
        </div>
        <div class="header-right">
          <button id="lock-btn" title="Lock Vault">🔒</button>
        </div>
      </div>

      <div class="search-box">
        <input type="text" id="search" placeholder="Search passwords...">
      </div>

      <!-- Current Site Match -->
      <div id="site-match" class="section hidden">
        <h3>🌐 Matches for this site</h3>
        <div id="site-matches-list"></div>
      </div>

      <!-- All Passwords -->
      <div class="section">
        <h3>🔑 All Passwords</h3>
        <div id="password-list">
          <p class="empty">Loading...</p>
        </div>
      </div>

      <!-- Save Prompt Banner -->
      <div id="save-banner" class="hidden">
        <p>Save detected credentials?</p>
        <div class="banner-actions">
          <button id="save-yes" class="btn-primary">Save</button>
          <button id="save-no" class="btn-outline">Dismiss</button>
        </div>
      </div>
    </div>
  </div>

  <script src="crypto.js"></script>
  <script src="popup.js"></script>
</body>
</html>
