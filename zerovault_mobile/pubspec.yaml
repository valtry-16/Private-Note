name: zerovault_mobile
description: ZeroVault Mobile — Zero-knowledge encrypted vault companion app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.3.0
  flutter_secure_storage: ^9.2.0
  cryptography: ^2.7.0
  local_auth: ^2.3.0
  file_picker: ^8.1.0
  flutter_markdown: ^0.6.18
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  go_router: ^13.0.0
  intl: ^0.19.0
  share_plus: ^10.0.0
  url_launcher: ^6.2.2
  path_provider: ^2.1.2
  open_filex: ^4.3.4
  crypto: ^3.0.3
  convert: ^3.1.1
  uuid: ^4.2.2
  flutter_slidable: ^3.0.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
